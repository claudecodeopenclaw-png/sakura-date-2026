<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3/29 東京花見デート | 7パターンスケジュール提案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.6s ease-in;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.95;
        }
        
        .info-box {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .info-box h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.4em;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .info-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .info-item label {
            color: #667eea;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .info-item value {
            font-size: 1.1em;
            color: #333;
        }
        
        .schedules {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .schedule-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s ease-out backwards;
        }
        
        .schedule-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        
        .schedule-card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .schedule-card-header h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
        }
        
        .schedule-card-header p {
            font-size: 0.95em;
            opacity: 0.95;
            line-height: 1.4;
        }
        
        .schedule-card-content {
            padding: 20px;
        }
        
        .meal-section {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .meal-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .meal-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        
        .meal-title::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            background: #764ba2;
        }
        
        .restaurant-card {
            background: #f9f9f9;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        
        .restaurant-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            color: #999;
            text-align: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .restaurant-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .restaurant-image.no-image {
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            color: #999;
        }
        
        .restaurant-info {
            padding: 15px;
        }
        
        .restaurant-name {
            font-size: 1.05em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .restaurant-details {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .restaurant-details-row {
            margin-bottom: 6px;
            display: flex;
            flex-wrap: wrap;
        }
        
        .restaurant-details-label {
            font-weight: bold;
            color: #667eea;
            margin-right: 6px;
            min-width: 50px;
        }
        
        .restaurant-links {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .btn {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-align: center;
        }
        
        .btn-maps {
            background: #4285f4;
            color: white;
            flex: 1;
        }
        
        .btn-maps:hover {
            background: #3367d6;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }
        
        .btn-website {
            background: #34a853;
            color: white;
            flex: 1;
        }
        
        .btn-website:hover {
            background: #2d8659;
            box-shadow: 0 4px 12px rgba(52, 168, 83, 0.3);
        }
        
        .reservation-badge {
            display: inline-block;
            padding: 3px 8px;
            background: #ffa500;
            color: white;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            margin-left: 6px;
        }
        
        .timeline {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .timeline-item {
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
        }
        
        .timeline-item:last-child {
            margin-bottom: 0;
        }
        
        .timeline-time {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: bold;
            min-width: 80px;
            white-space: nowrap;
        }
        
        .timeline-content {
            flex: 1;
        }
        
        .timeline-activity {
            font-weight: bold;
            color: #333;
            font-size: 0.95em;
            margin-bottom: 4px;
        }
        
        .timeline-details {
            color: #666;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .schedules {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .restaurant-image {
                height: 150px;
            }
            
            .timeline-item {
                flex-direction: column;
            }
            
            .timeline-time {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌸 3/29 東京花見デート</h1>
            <p>7つのスポット × 実際の飲食店情報を組み込んだ、7パターンスケジュール提案</p>
        </header>
        
        <div class="info-box">
            <h2>📋 デート基本情報</h2>
            <div class="info-grid">
                <div class="info-item">
                    <label>出発地</label>
                    <value>明大前駅 / 我孫子駅</value>
                </div>
                <div class="info-item">
                    <label>集合時間</label>
                    <value>12:00 以降</value>
                </div>
                <div class="info-item">
                    <label>帰宅時刻</label>
                    <value>21:30（我孫子駅着）</value>
                </div>
                <div class="info-item">
                    <label>予定時間</label>
                    <value>9時間30分以内</value>
                </div>
                <div class="info-item">
                    <label>アクティビティ</label>
                    <value>花見 + 昼食 + 夕食 + ネットカフェ</value>
                </div>
                <div class="info-item">
                    <label>開花状況</label>
                    <value>3/29時点：五分咲き～満開</value>
                </div>
            </div>
        </div>
        
        <div class="schedules" id="schedules"></div>
        
        <div class="info-box" style="text-align: center; margin-top: 40px;">
            <h2>💡 スケジュール選択のポイント</h2>
            <p style="line-height: 1.8; font-size: 1em;">
                「品質」か「バランス」か「体験」か——二人の優先順位で選択してください。<br>
                全パターン、花見と飲食をメインに、時間・予算・雰囲気を調整した構成です。<br>
                実際の飲食店情報・Google Maps・公式サイトにもリンク済みなので、そのまま予約・ナビに使えます。
            </p>
        </div>
    </div>
    
    <script>
        async function loadData() {
            try {
                const [spotsRes, schedulesRes, restaurantsRes] = await Promise.all([
                    fetch('./data/spots.json'),
                    fetch('./data/schedules.json'),
                    fetch('./data/restaurants.json')
                ]);
                
                const spots = await spotsRes.json();
                const schedules = await schedulesRes.json();
                const restaurants = await restaurantsRes.json();
                
                renderSchedules(schedules.schedules, restaurants.restaurants, spots.spots);
            } catch (error) {
                console.error('データ読込エラー:', error);
                document.getElementById('schedules').innerHTML = '<p>データ読込に失敗しました</p>';
            }
        }
        
        function getRestaurantsBySpot(spotId, mealType, restaurants) {
            return restaurants.filter(r => r.spotId === spotId && r.mealType === mealType);
        }
        
        function renderRestaurantCard(restaurant) {
            const imageHtml = restaurant.imageUrls && restaurant.imageUrls.length > 0
                ? `<img src="${restaurant.imageUrls[0]}" alt="${restaurant.name}">`
                : `<div class="no-image">写真を準備中...</div>`;
            
            const reservationBadge = restaurant.reservation === '要予約'
                ? `<span class="reservation-badge">要予約</span>`
                : '';
            
            const websiteBtn = restaurant.websiteUrl
                ? `<a href="${restaurant.websiteUrl}" target="_blank" class="btn btn-website">公式サイト</a>`
                : '';
            
            return `
                <div class="restaurant-card">
                    <div class="restaurant-image">
                        ${imageHtml}
                    </div>
                    <div class="restaurant-info">
                        <div class="restaurant-name">
                            ${restaurant.name}
                            ${reservationBadge}
                        </div>
                        <div class="restaurant-details">
                            <div class="restaurant-details-row">
                                <span class="restaurant-details-label">営業時間:</span>
                                <span>${restaurant.hours}</span>
                            </div>
                            <div class="restaurant-details-row">
                                <span class="restaurant-details-label">予算:</span>
                                <span>${restaurant.budget}</span>
                            </div>
                            <div class="restaurant-details-row">
                                <span class="restaurant-details-label">所在地:</span>
                                <span>${restaurant.address}</span>
                            </div>
                            <div class="restaurant-details-row">
                                <span class="restaurant-details-label">電話:</span>
                                <span>${restaurant.phone}</span>
                            </div>
                        </div>
                        <div class="restaurant-links">
                            <a href="${restaurant.mapsUrl}" target="_blank" class="btn btn-maps">Google Maps</a>
                            ${websiteBtn}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderMealSection(mealType, mealLabel, spotId, restaurants) {
            const mealRestaurants = getRestaurantsBySpot(spotId, mealType, restaurants);
            
            if (mealRestaurants.length === 0) {
                return '';
            }
            
            const restaurantHtml = mealRestaurants.map(renderRestaurantCard).join('');
            
            return `
                <div class="meal-section">
                    <div class="meal-title">${mealLabel}</div>
                    ${restaurantHtml}
                </div>
            `;
        }
        
        function renderTimeline(timeline) {
            const timelineHtml = timeline.slice(0, 4).map(item => `
                <div class="timeline-item">
                    <div class="timeline-time">${item.time}</div>
                    <div class="timeline-content">
                        <div class="timeline-activity">${item.activity}</div>
                        <div class="timeline-details">
                            ${item.details || item.location}
                        </div>
                    </div>
                </div>
            `).join('');
            
            return `
                <div class="timeline">
                    ${timelineHtml}
                </div>
            `;
        }
        
        function renderSchedules(schedules, restaurants, spots) {
            const container = document.getElementById('schedules');
            
            container.innerHTML = schedules.map((schedule, index) => {
                const spot = spots.find(s => s.id === schedule.spot.id);
                const lunchHtml = renderMealSection('lunch', '🍽️ 昼食', schedule.spot.id, restaurants);
                const dinnerHtml = renderMealSection('dinner', '🍷 夕食', schedule.spot.id, restaurants);
                const timelineHtml = renderTimeline(schedule.timeline);
                
                return `
                    <div class="schedule-card" style="animation-delay: ${index * 0.1}s">
                        <div class="schedule-card-header">
                            <h3>パターン ${index + 1}</h3>
                            <p>${schedule.title}</p>
                        </div>
                        <div class="schedule-card-content">
                            <div style="margin-bottom: 20px;">
                                <strong>ポイント:</strong>
                                <p style="font-size: 0.95em; color: #666; margin-top: 8px; line-height: 1.5;">
                                    ${schedule.reason}
                                </p>
                            </div>
                            
                            ${lunchHtml}
                            ${dinnerHtml}
                            
                            <div style="margin-top: 20px;">
                                <strong>⏰ スケジュール概要</strong>
                                ${timelineHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        loadData();
    </script>
</body>
</html>
